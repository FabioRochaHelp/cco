# Laravel + PostgreSQL + Redis + Nginx + Reverb + queue worker
# Pré-requisitos: .env com DB_DATABASE / DB_USERNAME / DB_PASSWORD coerentes com o Postgres.
# Os serviços PHP forçam DB_* de rede e, se .env deixar senha vazia, DB_PASSWORD=${DB_PASSWORD:-secret}
# (igual ao Postgres). Ajuste DB_PASSWORD no .env se mudar a senha do banco.
# Frontend: a imagem PHP não tem Node — use `docker compose run --rm node npm run build` ou npm no host.

name: same192

x-app-common: &app-common
  build:
    context: .
    dockerfile: docker/php/Dockerfile
  image: same192-php
  restart: unless-stopped
  volumes:
    - .:/var/www/html
  working_dir: /var/www/html
  env_file:
    - .env
  networks:
    - same192

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DB_USERNAME:-laravel}\" -d \"${DB_DATABASE:-laravel}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - same192

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - same192

  app:
    <<: *app-common
    container_name: same192-app
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      # Porta no host (padrão 8888). Se estiver ocupada, defina FORWARD_HTTP_PORT no .env, ex.: 9080
      - "${FORWARD_HTTP_PORT:-8888}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - reverb
    networks:
      - same192

  reverb:
    <<: *app-common
    container_name: same192-reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    <<: *app-common
    container_name: same192-queue
    command: php artisan queue:work redis --sleep=3 --tries=3
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html

volumes:
  postgres_data:
  redis_data:

networks:
  same192:
    driver: bridge
